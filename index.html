<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi MAN 2 Sijunjung</title>
    <link class="rounded-full" rel="icon" type="image/png" href="./foto/1.webp">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* Transisi smooth saat splash screen hilang */
        .fade-out {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Animasi konten muncul dari bawah */
        .animate-fade-up {
            opacity: 0;
            transform: translateY(15px);
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .delay-1 { animation-delay: 0.15s; }
        .delay-2 { animation-delay: 0.25s; }
        .delay-3 { animation-delay: 0.35s; }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-gradient-to-tr from-slate-100 via-emerald-50/30 to-blue-50/30 h-screen w-screen flex flex-col justify-center items-center p-4 sm:p-6 relative overflow-hidden select-none">

    <div class="absolute top-[-10%] left-[-10%] w-[60vw] h-[60vw] md:w-[40vw] md:h-[40vw] bg-emerald-200/20 rounded-full blur-3xl -z-10"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] md:w-[40vw] md:h-[40vw] bg-blue-200/20 rounded-full blur-3xl -z-10"></div>

    <div id="splash-screen" class="fixed inset-0 bg-gradient-to-br from-emerald-600 to-teal-800 flex flex-col items-center justify-center z-50">
        <div class="text-center space-y-4 px-4">
            <div class="relative flex items-center justify-center">
                <div class="absolute inset-0 rounded-full bg-white/20 animate-ping scale-125 duration-1000"></div>
                <img src="./foto/1.webp" alt="Logo MAN 2 Sijunjung" class="w-24 h-24 sm:w-32 sm:h-32 relative drop-shadow-2xl object-contain animate-bounce [animation-duration:2s]">
            </div>
            <div>
                <h1 class="text-white text-2xl sm:text-3xl font-extrabold tracking-wide drop-shadow-sm">MAN 2 SIJUNJUNG</h1>
                <p class="text-emerald-200 text-xs font-semibold tracking-widest uppercase mt-1 opacity-90">Plus Keterampilan</p>
            </div>
            <div class="w-20 h-1 bg-emerald-950/40 rounded-full mx-auto overflow-hidden mt-6">
                <div class="h-full w-1/2 bg-white rounded-full origin-left" style="animation: progress 1.5s infinite ease-in-out;"></div>
            </div>
        </div>
    </div>

    <style>
        @keyframes progress {
            0% { transform: translateX(-100%) scaleX(1); }
            50% { transform: translateX(0%) scaleX(1.4); }
            100% { transform: translateX(200%) scaleX(1); }
        }
    </style>

    <div class="w-full max-w-[360px] sm:max-w-md flex flex-col items-center justify-center space-y-5">
        
        <main class="w-full bg-white/80 backdrop-blur-xl rounded-3xl shadow-xl shadow-emerald-950/5 p-6 sm:p-8 border border-white">
            
            <div class="animate-fade-up text-center">
                <img src="./foto/1.webp" alt="Logo MAN 2 Sijunjung" class="w-18 h-18 sm:w-22 sm:h-22 mx-auto mb-4 object-contain drop-shadow-md hover:scale-105 transition-transform duration-300">
                <h2 class="text-xl sm:text-2xl font-extrabold text-slate-800 tracking-tight">Sistem Absensi Digital</h2>
                <p class="text-xs sm:text-sm font-medium text-slate-500 mt-0.5 mb-6 sm:mb-8">MAN 2 Sijunjung Plus Keterampilan</p>
            </div>

            <div class="space-y-3 sm:space-y-4">
                <button onclick="pilihPeran('siswa')" class="animate-fade-up delay-1 w-full flex items-center justify-between p-3.5 sm:p-4 bg-gradient-to-r from-emerald-50 to-emerald-50/30 hover:from-emerald-500 hover:to-emerald-600 border border-emerald-100 hover:border-emerald-500 rounded-2xl cursor-pointer shadow-xs hover:shadow-md hover:shadow-emerald-500/20 transition-all duration-300 group">
                    <div class="flex items-center space-x-3 sm:space-x-4">
                        <div class="p-2.5 sm:p-3.5 bg-emerald-500 text-white rounded-xl shadow-md shadow-emerald-500/20 group-hover:bg-white group-hover:text-emerald-600 transition-all duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
                            </svg>
                        </div>
                        <div class="text-left">
                            <span class="block font-bold text-slate-700 text-base sm:text-lg group-hover:text-white transition-colors duration-300">Siswa / Siswi</span>
                            <span class="text-[11px] sm:text-xs text-slate-500 group-hover:text-emerald-100 transition-colors duration-300">Konfirmasi kehadiran mandiri</span>
                        </div>
                    </div>
                    <div class="p-1 sm:p-1.5 rounded-md bg-emerald-500/10 text-emerald-600 group-hover:bg-white/20 group-hover:text-white transition-all duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 sm:h-5 sm:w-5 transform group-hover:translate-x-1 group-hover:rotate-45 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </div>
                </button>

                <button onclick="pilihPeran('admin')" class="animate-fade-up delay-2 w-full flex items-center justify-between p-3.5 sm:p-4 bg-gradient-to-r from-blue-50 to-blue-50/30 hover:from-blue-600 hover:to-indigo-600 border border-blue-100 hover:border-blue-600 rounded-2xl cursor-pointer shadow-xs hover:shadow-md hover:shadow-blue-600/20 transition-all duration-300 group">
                    <div class="flex items-center space-x-3 sm:space-x-4">
                        <div class="p-2.5 sm:p-3.5 bg-blue-600 text-white rounded-xl shadow-md shadow-blue-600/20 group-hover:bg-white group-hover:text-blue-600 transition-all duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                        <div class="text-left">
                            <span class="block font-bold text-slate-700 text-base sm:text-lg group-hover:text-white transition-colors duration-300">Admin / Guru</span>
                            <span class="text-[11px] sm:text-xs text-slate-500 group-hover:text-blue-100 transition-colors duration-300">Kelola data & rekapitulasi</span>
                        </div>
                    </div>
                    <div class="p-1 sm:p-1.5 rounded-md bg-blue-600/10 text-blue-600 group-hover:bg-white/20 group-hover:text-white transition-all duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 sm:h-5 sm:w-5 transform group-hover:translate-x-1 group-hover:rotate-45 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </div>
                </button>
            </div>

            <div class="animate-fade-up delay-3 flex items-center justify-center mt-6 sm:mt-8 p-2.5 sm:p-3 bg-slate-50/50 rounded-xl border border-slate-100/80">
                <label class="flex items-center space-x-3 cursor-pointer select-none">
                    <input type="checkbox" id="remember-me" class="peer hidden">
                    <div class="w-4 h-4 sm:w-5 h-5 border-2 border-slate-300 rounded-md flex items-center justify-center peer-checked:bg-emerald-500 peer-checked:border-emerald-500 transition-all duration-200">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 sm:h-3.5 sm:w-3.5 text-white opacity-0 peer-checked:opacity-100 transition-opacity" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                    <span class="text-[11px] sm:text-xs font-semibold text-slate-600 peer-checked:text-emerald-700 transition-colors">Ingat pilihan di perangkat ini</span>
                </label>
            </div>
        </main>

        <footer class="text-center text-[10px] sm:text-xs font-medium text-slate-400 tracking-wide">
            &copy; 2026 MAN 2 Sijunjung Plus Keterampilan.
        </footer>
    </div>

    <script>
        const splashScreen = document.getElementById('splash-screen');
        const checkboxIngat = document.getElementById('remember-me');

        function dapatkanRute(peran) {
            return `./${peran}/${peran}.html`;
        }

        window.addEventListener('DOMContentLoaded', () => {
            const peranTersimpan = localStorage.getItem('peran_absensi');
            
            if (peranTersimpan === 'siswa' || peranTersimpan === 'admin') {
                window.location.href = dapatkanRute(peranTersimpan);
            } else {
                setTimeout(() => {
                    splashScreen.classList.add('fade-out');
                }, 2200);
            }
        });

        function pilihPeran(peran) {
            if (checkboxIngat.checked) {
                localStorage.setItem('peran_absensi', peran);
            } else {
                localStorage.removeItem('peran_absensi');
            }

            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.25s ease';
            
            setTimeout(() => {
                window.location.href = dapatkanRute(peran);
            }, 300); // Diperbaiki dari 2500 menjadi 300ms agar perpindahan halaman cepat & responsif
        }
    </script>
</body>
</html>
